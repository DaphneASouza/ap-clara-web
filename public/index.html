<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clara Digital — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --laranja: #E65C00;
      --laranja-escuro: #B84800;
      --laranja-claro: #FFF3EC;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(230,92,0,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(230,92,0,0.08) 0%, transparent 50%);
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: var(--laranja);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 28px;
    }

    .logo-titulo {
      font-size: 22px;
      font-weight: 700;
      color: #111;
    }

    .logo-sub {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #111;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input:focus {
      border-color: var(--laranja);
      box-shadow: 0 0 0 3px rgba(230,92,0,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--laranja);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s;
      letter-spacing: .3px;
    }

    .btn-login:hover { background: var(--laranja-escuro); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    .erro {
      background: #FFF0F0;
      border: 1px solid #FFCCCC;
      color: #CC2200;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .rodape {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #AAA;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🎬</div>
      <div class="logo-titulo">Clara Digital</div>
      <div class="logo-sub">Gerador de Autorizações de Produção</div>
    </div>

    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="login" placeholder="seu login" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="btn-entrar">Entrar</button>
    <div class="erro" id="erro-msg"></div>

    <div class="rodape">SESC-AR/DF · Contrato Nº 018188/2024</div>
  </div>

  <script>
    const btnEntrar = document.getElementById('btn-entrar');
    const erroMsg   = document.getElementById('erro-msg');

    async function login() {
      const login = document.getElementById('login').value.trim();
      const senha = document.getElementById('senha').value;
      if (!login || !senha) { mostrarErro('Preencha usuário e senha.'); return; }

      btnEntrar.disabled = true;
      btnEntrar.textContent = 'Entrando...';
      erroMsg.style.display = 'none';

      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, senha }),
        });
        const data = await r.json();
        if (r.ok) {
          window.location.href = '/app.html';
        } else {
          mostrarErro(data.erro || 'Erro ao entrar.');
        }
      } catch {
        mostrarErro('Erro de conexão. Tente novamente.');
      } finally {
        btnEntrar.disabled = false;
        btnEntrar.textContent = 'Entrar';
      }
    }

    function mostrarErro(msg) {
      erroMsg.textContent = msg;
      erroMsg.style.display = 'block';
    }

    btnEntrar.addEventListener('click', login);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
